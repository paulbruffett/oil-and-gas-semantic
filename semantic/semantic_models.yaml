# OSI semantic models for production surveillance (slice #3, ADR 0008/0011).
#
# Every `node_relation.alias`, entity `expr`, dimension `expr`, and measure `expr` below is a
# canonical OSDU PDM table/column name sourced from spec/osdu/pdm_profile.json (ADR 0010). This is
# what makes the semantic layer OSDU-conformant (issue #3 AC #6): measures and dimensions map onto
# canonical columns, and tests/test_semantic_conformance.py fails if any referenced column drifts
# away from the vendored OSDU profile.
#
# node_relation.schema_name is `main` -- the DuckDB schema the reference compile (ADR 0011) attaches
# the canonical Parquet under; it is not part of the OSDU model.
---
semantic_model:
  name: well_vol_daily
  description: OSDU PDM WELL_VOL_DAILY -- measured daily well volumes (the actuals).
  node_relation:
    schema_name: main
    alias: well_vol_daily
  defaults:
    agg_time_dimension: volume_date
  entities:
    - name: well_volume_daily
      type: primary
      expr: WELL_VOLUME_DAILY_ID
    - name: well
      type: foreign
      expr: WELL_ID
  dimensions:
    - name: volume_date
      type: time
      expr: VOLUME_DATE
      type_params:
        time_granularity: day
  measures:
    - name: actual_oil_volume
      description: Measured oil volume (bbl).
      agg: sum
      expr: OIL_VOLUME
      agg_time_dimension: volume_date
    - name: actual_gas_volume
      description: Measured gas volume (Mscf) -- the gas leg of the asset-rollup product mix (#8).
      agg: sum
      expr: GAS_VOLUME
      agg_time_dimension: volume_date
    - name: actual_water_volume
      description: Measured water volume (bbl) -- the water leg of the asset-rollup product mix (#8).
      agg: sum
      expr: WATER_VOLUME
      agg_time_dimension: volume_date
    - name: on_stream_hours
      description: On-stream (producing) hours -- the numerator of uptime % (deferment use case #4).
      agg: sum
      expr: HOURS_ON
      agg_time_dimension: volume_date
    - name: daily_record_count
      description: Count of daily volume records; x24 gives calendar hours for uptime %.
      agg: count
      expr: WELL_VOLUME_DAILY_ID
      agg_time_dimension: volume_date
---
semantic_model:
  name: product_volume_summary
  description: OSDU PDM PRODUCT_VOLUME_SUMMARY -- the forecast (expected) oil series, QUANTITY_METHOD='Forecast'.
  node_relation:
    schema_name: main
    alias: product_volume_summary
  defaults:
    agg_time_dimension: forecast_date
  entities:
    - name: product_volume_summary
      type: primary
      expr: PRODUCT_VOLUME_SUMMARY_ID
    - name: reporting_entity
      type: foreign
      expr: REPORTING_ENTITY_ID
  dimensions:
    - name: forecast_date
      type: time
      expr: START_DATE
      type_params:
        time_granularity: day
    - name: product
      type: categorical
      expr: PRODUCT
    - name: quantity_method
      type: categorical
      expr: QUANTITY_METHOD
  measures:
    - name: expected_oil_volume
      description: Forecast (expected) oil volume (bbl).
      agg: sum
      expr: VOLUME
      agg_time_dimension: forecast_date
---
semantic_model:
  name: reporting_entity
  description: OSDU PDM REPORTING_ENTITY -- polymorphic pointer volumes report against; resolves forecast->well.
  node_relation:
    schema_name: main
    alias: reporting_entity
  entities:
    - name: reporting_entity
      type: primary
      expr: REPORTING_ENTITY_ID
    - name: well
      type: foreign
      expr: ASSOCIATED_OBJECT_ID
  dimensions:
    - name: reporting_entity_kind
      type: categorical
      expr: REPORTING_ENTITY_KIND
---
semantic_model:
  name: well
  description: OSDU PDM WELL -- master well entity; rolls up to FIELD.
  node_relation:
    schema_name: main
    alias: well
  entities:
    - name: well
      type: primary
      expr: WELL_ID
    - name: field
      type: foreign
      expr: FIELD_ID
    - name: facility
      type: foreign
      expr: FACILITY_ID
  dimensions:
    - name: uwi
      type: categorical
      expr: UWI
    - name: well_name
      type: categorical
      expr: WELL_NAME
    - name: operator
      type: categorical
      expr: OPERATOR
---
semantic_model:
  name: field
  description: OSDU PDM FIELD -- producing asset grouping wells roll up to.
  node_relation:
    schema_name: main
    alias: field
  entities:
    - name: field
      type: primary
      expr: FIELD_ID
  dimensions:
    - name: field_name
      type: categorical
      expr: FIELD_NAME
---
semantic_model:
  name: facility
  description: OSDU PDM FACILITY -- battery/facility master; the Well -> Facility -> Field hierarchy for asset rollups (#8).
  node_relation:
    schema_name: main
    alias: facility
  entities:
    - name: facility
      type: primary
      expr: FACILITY_ID
    - name: field
      type: foreign
      expr: FIELD_ID
  dimensions:
    - name: facility_name
      type: categorical
      expr: FACILITY_NAME
    - name: facility_type
      type: categorical
      expr: FACILITY_TYPE
    - name: facility_operator
      type: categorical
      expr: OPERATOR
---
semantic_model:
  name: down_time_event
  description: OSDU PDM DOWN_TIME_EVENT -- downtime events (cause + duration) for the deferment use case (#4).
  node_relation:
    schema_name: main
    alias: down_time_event
  defaults:
    agg_time_dimension: event_date
  entities:
    - name: down_time_event
      type: primary
      expr: DOWN_TIME_EVENT_ID
    - name: reporting_entity
      type: foreign
      expr: REPORTING_ENTITY_ID
  dimensions:
    - name: event_date
      type: time
      expr: START_DATE
      type_params:
        time_granularity: day
    - name: event_category
      type: categorical
      expr: EVENT_CATEGORY
  measures:
    - name: downtime_hours
      description: Downtime duration (hours) -- Σ event duration by cause (deferment use case #4).
      agg: sum
      expr: DURATION_HOURS
      agg_time_dimension: event_date
---
semantic_model:
  name: well_test
  description: OSDU PDM WELL_TEST -- periodic well tests (rates + date) for the well-test use case (#6).
  node_relation:
    schema_name: main
    alias: well_test
  defaults:
    agg_time_dimension: test_date
  entities:
    - name: well_test
      type: primary
      expr: WELL_TEST_ID
    - name: well
      type: foreign
      expr: WELL_ID
  dimensions:
    - name: test_date
      type: time
      expr: TEST_DATE
      type_params:
        time_granularity: day
    - name: test_type
      type: categorical
      expr: TEST_TYPE
  measures:
    - name: well_test_count
      description: Count of well tests; MAX(test_date) gives the last-test date for days-since-test.
      agg: count
      expr: WELL_TEST_ID
      agg_time_dimension: test_date
    - name: test_oil_rate
      description: Oil rate measured at test (bbl/d).
      agg: average
      expr: OIL_RATE
      agg_time_dimension: test_date
---
semantic_model:
  name: rpen_allocation_factor
  description: OSDU PDM RPEN_ALLOCATION_FACTOR -- from->to allocation factors for the allocation use case (#6).
  node_relation:
    schema_name: main
    alias: rpen_allocation_factor
  defaults:
    agg_time_dimension: alloc_start_date
  entities:
    - name: rpen_allocation_factor
      type: primary
      expr: RPEN_ALLOCATION_FACTOR_ID
    - name: from_reporting_entity
      type: foreign
      expr: FROM_REPORTING_ENTITY_ID
    - name: to_reporting_entity
      type: foreign
      expr: TO_REPORTING_ENTITY_ID
  dimensions:
    - name: alloc_start_date
      type: time
      expr: START_DATE
      type_params:
        time_granularity: day
    - name: alloc_end_date
      type: categorical
      expr: END_DATE
    - name: product
      type: categorical
      expr: PRODUCT
  measures:
    - name: allocation_factor_value
      description: The apportioning factor (share of the from-entity's measured volume); one row per well/period.
      agg: sum
      expr: ALLOCATION_FACTOR
      agg_time_dimension: alloc_start_date
