# OSI governed metrics for production surveillance (slice #3, DESIGN.md §6.3).
#
# The KPIs are defined once here and translated per platform (ADR 0008). The reference compile
# (ADR 0011) executes them over the canonical Parquet and the result is graded against the
# co-generated gold answers (ADR 0006).
---
metric:
  name: actual_oil
  description: Total measured oil produced over the window (bbl).
  type: simple
  type_params:
    measure: actual_oil_volume
---
metric:
  name: expected_oil
  description: Total forecast (expected) oil over the window (bbl) -- the decline-curve baseline.
  type: simple
  type_params:
    measure: expected_oil_volume
---
metric:
  name: production_efficiency
  description: actual oil / expected oil; the surveillance signal ("below expected" = below the materiality band).
  type: ratio
  type_params:
    numerator:
      name: actual_oil
    denominator:
      name: expected_oil
---
metric:
  name: oil_shortfall
  description: expected oil - actual oil (bbl); how much a well missed by.
  type: derived
  type_params:
    expr: expected_oil - actual_oil
    metrics:
      - name: expected_oil
      - name: actual_oil
---
# --- Deferment & downtime attribution (theme 2, issue #4, DESIGN.md §6.3) ---
metric:
  name: downtime_hours
  description: Σ downtime-event duration (hours) over the window; group by event_category for top causes.
  type: simple
  type_params:
    measure: downtime_hours
---
metric:
  name: on_stream_hours
  description: Σ on-stream (producing) hours over the window -- the numerator of uptime %.
  type: simple
  type_params:
    measure: on_stream_hours
---
metric:
  name: calendar_days
  description: Count of daily volume records; x24 gives calendar hours (uptime % denominator).
  type: simple
  type_params:
    measure: daily_record_count
---
metric:
  name: uptime_pct
  description: on-stream hours / calendar hours x 100 (uptime %, §6.3).
  type: derived
  type_params:
    expr: on_stream_hours / (calendar_days * 24) * 100
    metrics:
      - name: on_stream_hours
      - name: calendar_days
# Deferred volume (§6.3 "forecast - actual by cause") is a compile-assembled KPI, not a pure
# aggregate: deferred = Σ over downtime events of forecast_oil(entity, date) x DURATION_HOURS/24,
# grouped by event_category (ADR 0017). The row-level forecast x downtime product cannot be a
# MetricFlow metric over separate measures, so the reference compile (compile.compute_deferment)
# assembles it from the governed expected_oil_volume + downtime_hours measures and reproduces gold.
