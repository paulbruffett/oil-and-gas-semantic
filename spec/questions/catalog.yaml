# Use-case question catalog -- the base's agent-layer contract (ADR 0005, DESIGN.md §6.2/§6.4).
#
# This is a standalone, versioned base artifact: the six use-case themes, each with the question(s)
# an implementation must answer, keyed to the deterministic gold-answer id the generator emits. The
# Axis-B harness (#9) and any use-case implementation read this file; it depends on no use-case code.
#
# Each question's `gold_id` is the join key to a co-generated gold answer (its JSON carries the same
# value in `question_id`), so there is a single source for the id -- no drift path between the
# question and its gold. `expected_behavior` is one of `behaviors` below; straight questions expect
# `answered`, while the adversarial tier (#22, ADR 0013) encodes assumptions/clarification/refusal.
version: 1

# Allowed expected-behavior values. Mirrors the `behavior` enum in answer_submission.schema.json;
# an engineering test asserts the two stay identical.
behaviors:
  - answered                 # a normal answer with values
  - assumptions-stated       # answered, but under an explicit stated assumption
  - clarification-requested  # under-specified: the right move is to ask, not guess
  - refused-data-quality     # data is too broken/absent to answer responsibly

themes:
  - id: production-surveillance
    number: 1
    hero: true
    title: Production surveillance
    status: implemented        # gold co-generated by the generator (slices #2/#3)
    kpis: [expected rate, variance/efficiency]
    osdu_entities: [Reported Volume, Well, Well Test]
    questions:
      - id: surveillance-below-expected-oil
        gold_id: surveillance-below-expected-oil
        gold_artifact: gold/surveillance.json
        tier: straight
        expected_behavior: answered
        text: >-
          Which wells produced below expected oil rate this week, and by how much?

  - id: deferment-downtime
    number: 2
    hero: false
    title: Deferment & downtime attribution
    status: implemented        # gold co-generated by the generator (slice #4)
    kpis: [deferred volume, uptime %]
    osdu_entities: [Down Time Event, Reported Volume]
    questions:
      - id: deferment-top-downtime-causes
        gold_id: deferment-top-downtime-causes
        gold_artifact: gold/deferment.json
        tier: straight
        expected_behavior: answered
        text: >-
          What did we defer last month, and what were the top downtime causes?

  - id: decline-trend
    number: 3
    hero: false
    title: Decline & trend
    status: planned            # shell half lands in issue #5
    kpis: [decline rate, cumulative production]
    osdu_entities: [Reported Volume, Well, Field]
    questions:
      - id: decline-12-month-field-oil
        gold_id: decline-12-month-field-oil
        gold_artifact: gold/decline.json
        tier: straight
        expected_behavior: answered
        text: >-
          What is the 12-month oil decline for Field X, and which wells are declining faster
          than forecast?

  - id: welltest-allocation
    number: 4
    hero: false
    title: Well-test & allocation validation
    status: planned            # shell half lands in issue #6
    kpis: [days since last well test, allocation variance]
    osdu_entities: [Well Test, Allocation]
    questions:
      - id: welltest-stale-or-anomalous-allocation
        gold_id: welltest-stale-or-anomalous-allocation
        gold_artifact: gold/welltest.json
        tier: straight
        expected_behavior: answered
        text: >-
          Which wells have stale tests or anomalous allocation?

  - id: operational-exceptions
    number: 5
    hero: false
    title: Operational exceptions / watchlist
    status: planned            # shell half lands in issue #7
    kpis: [water cut, GOR, days down]
    osdu_entities: [Reported Volume, Well Test, Down Time Event]
    questions:
      - id: watchlist-down-watering-out-gor-change
        gold_id: watchlist-down-watering-out-gor-change
        gold_artifact: gold/watchlist.json
        tier: straight
        expected_behavior: answered
        text: >-
          Which wells are down, watering out, or showing a GOR change?

  - id: asset-rollups
    number: 6
    hero: false
    title: Asset rollups
    status: planned            # shell half lands in issue #8
    kpis: [period-over-period delta, contribution %]
    osdu_entities: [Reported Volume, Facility, Hierarchy]
    questions:
      - id: rollup-oil-gas-water-by-field-operator
        gold_id: rollup-oil-gas-water-by-field-operator
        gold_artifact: gold/rollups.json
        tier: straight
        expected_behavior: answered
        text: >-
          Oil/gas/water by field and operator this month vs last -- who are the biggest movers?
