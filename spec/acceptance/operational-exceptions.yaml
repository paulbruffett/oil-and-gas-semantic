      The water-cut, GOR-change, and days-down KPIs over the trailing-current / leading-baseline
      windows (ADR 0022) are implemented on Databricks as Unity Catalog Metric Views derived from
      the shell's OSI definitions.
  - id: wl-vocabulary
    anchor: evidence
    verify: "LPG vocabulary content committed; the mappings are absent from the shell (knowledge/vocabulary.yaml) so this is fork-authored"
    text: >-
      The LPG business vocabulary maps watchlist phrasings -- "watering out" to the governed
      water-cut metric, "GOR change", "down" -- so natural language resolves to governed metrics
      (ADR 0004); this is the distinctive contest content of the theme.
  - id: wl-nl-resolution
    anchor: panel
    text: >-
      The agent resolves the question's phrasing through the vocabulary/knowledge layer rather
      than hard-coded keyword routing -- judged on the answer path, not just the artifact.
